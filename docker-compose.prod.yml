services:
  api:
    build:
      context: ./backend
      args:
        INSTALL_ML_DEPS: ${INSTALL_ML_DEPS:-true}
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./backend
      args:
        INSTALL_ML_DEPS: ${INSTALL_ML_DEPS:-true}
    env_file:
      - .env
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app inspect ping --timeout=5 >/dev/null"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 45s

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    expose:
      - "80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/api/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

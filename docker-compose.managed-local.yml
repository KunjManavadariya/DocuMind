services:
  api:
    build:
      context: ./backend
      args:
        INSTALL_ML_DEPS: ${INSTALL_ML_DEPS:-true}
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./backend
      args:
        INSTALL_ML_DEPS: ${INSTALL_ML_DEPS:-true}
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: celery -A app.worker.celery_app worker --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker.celery_app inspect ping --timeout=5 >/dev/null"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 45s

  frontend:
    build:
      context: ./frontend
      target: development
    env_file:
      - .env
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  frontend_node_modules:
